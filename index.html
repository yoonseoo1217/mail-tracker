<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>등기우편 관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#F7F6F3; --surface:#FFFFFF; --surface2:#F0EEE9; --border:#E2DDD6; --border2:#C8C3BB;
    --text:#1A1916; --text2:#6B6760; --text3:#9E9B96;
    --blue:#1C5FA8; --blue-bg:#EBF2FB; --green:#1A7A4A; --green-bg:#E6F5ED;
    --amber:#8A5A00; --amber-bg:#FDF3DC; --red:#B83232; --red-bg:#FCEAEA;
    --r:10px; --rs:6px; --mono:'JetBrains Mono',monospace; --sans:'Noto Sans KR',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

  .top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
  .top-left{display:flex;align-items:center;gap:10px}
  .logo{width:28px;height:28px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center}
  .logo svg{width:16px;height:16px}
  .top-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
  .top-right{display:flex;gap:8px}
  .icon-btn{width:34px;height:34px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:15px;transition:background .15s}
  .icon-btn:hover{background:var(--surface2)}

  .tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 16px}
  .tab{padding:12px 14px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
  .tab.active{color:var(--text);border-bottom-color:var(--text)}

  .main{max-width:680px;margin:0 auto;padding:16px}
  .panel{display:none}.panel.active{display:block}

  /* 카메라 영역 */
  .scan-zone{background:var(--text);border-radius:var(--r);overflow:hidden;position:relative;margin-bottom:12px}
  .scan-video-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#000;display:flex;align-items:center;justify-content:center}
  #scanVideo{width:100%;height:100%;object-fit:cover;display:block}
  .scan-overlay{position:absolute;inset:0;pointer-events:none;display:none}
  .scan-overlay.show{display:block}
  .ocr-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:78%;max-width:300px;height:64px;border:2px solid rgba(255,255,255,.9);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.35)}
  .ocr-hint{position:absolute;top:calc(50% + 48px);left:50%;transform:translateX(-50%);color:white;font-size:12px;font-weight:500;background:rgba(0,0,0,.55);padding:5px 12px;border-radius:99px;white-space:nowrap}
  .scan-idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:white;text-align:center;padding:20px}
  .scan-idle-icon{font-size:40px;opacity:.6}
  .scan-idle p{font-size:13px;opacity:.7;line-height:1.5}
  .scan-controls{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,.12)}
  .scan-btn{padding:14px;background:rgba(0,0,0,.45);color:white;border:none;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
  .scan-btn:hover{background:rgba(0,0,0,.6)}
  .scan-btn.active{background:rgba(28,95,168,.6)}
  .scan-btn-full{grid-column:span 2}
  .cap-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(28,95,168,.9);color:white;font-size:11px;font-weight:600;padding:5px 14px;border-radius:99px;display:none;align-items:center;gap:6px}
  .cap-badge.show{display:flex}
  .cap-badge .spinner-sm{width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
  .card-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
  .step-num{width:20px;height:20px;border-radius:50%;background:var(--text);color:white;font-size:11px;font-family:var(--mono);font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .card-header h2{font-size:14px;font-weight:600}
  .card-body{padding:14px 16px}

  .result-box{border-radius:var(--rs);padding:12px;margin-bottom:12px;display:none}
  .result-box.show{display:block}
  .result-box.loading{background:var(--surface2);border:1px solid var(--border)}
  .result-box.ok{background:var(--green-bg);border:1px solid #A8DAC0}
  .result-box.err{background:var(--red-bg);border:1px solid #F0BABA}
  .rl{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
  .spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .rg{display:grid;grid-template-columns:80px 1fr;gap:5px 10px;font-size:12px}
  .rk{color:var(--green);font-weight:500}.rv{color:#0F4A2C;font-weight:600}

  .ocr-read{background:var(--blue-bg);border:1px solid #BBD5F0;border-radius:var(--rs);padding:10px 12px;margin-bottom:12px;display:none;align-items:center;justify-content:space-between;gap:10px}
  .ocr-read.show{display:flex}
  .ocr-read-num{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:2px;color:var(--blue)}
  .ocr-read-lbl{font-size:10px;color:var(--blue);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}

  .manual-input-wrap{display:flex;gap:8px;margin-bottom:8px}
  .manual-input{flex:1;font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:1.5px;padding:11px 12px;border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s,background .15s}
  .manual-input:focus{border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(28,95,168,.1)}
  .manual-input::placeholder{font-family:var(--sans);font-size:12px;letter-spacing:0;color:var(--text3);font-weight:400}
  .go-btn{padding:0 16px;background:var(--text);color:white;border:none;border-radius:var(--rs);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s}
  .go-btn:hover{opacity:.85}

  .epost-link{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;margin-top:4px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);font-size:12px;font-weight:500;color:var(--blue);cursor:pointer;text-decoration:none;transition:background .15s}
  .epost-link:hover{background:var(--blue-bg)}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .form-row.single{grid-template-columns:1fr}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px}
  .field label .req{color:var(--red);margin-left:2px}
  .field input{padding:9px 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);font-family:var(--sans);font-size:13px;color:var(--text);outline:none;transition:border-color .15s,background .15s;width:100%}
  .field input:focus{border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(28,95,168,.1)}
  .field input.pre{color:var(--text2)}

  .btn-p{width:100%;padding:13px;background:var(--text);color:white;border:none;border-radius:var(--r);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .1s;margin-top:14px}
  .btn-p:hover{opacity:.88}.btn-p:active{transform:scale(.99)}.btn-p:disabled{opacity:.3;cursor:not-allowed}
  .btn-s{width:100%;padding:11px;background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s;margin-top:8px}
  .btn-s:hover{background:var(--surface2)}

  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
  .stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:4px}
  .stat-val{font-size:22px;font-weight:600;font-family:var(--mono)}
  .stat-val.blue{color:var(--blue)}.stat-val.amber{color:var(--amber)}.stat-val.red{color:var(--red)}

  .list-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .lh{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .lh h2{font-size:14px;font-weight:600}
  .lh span{font-size:12px;color:var(--text3);font-family:var(--mono)}
  .toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
  .si{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);font-family:var(--sans);font-size:12px;color:var(--text);outline:none}
  .si:focus{border-color:var(--blue);background:var(--surface)}
  .fb{padding:7px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:background .12s,border-color .12s,color .12s}
  .fb.active{background:var(--text);color:white;border-color:var(--text)}
  .tw{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:520px}
  thead th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--surface2)}
  td{padding:10px 12px;vertical-align:middle;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  td.mono{font-family:var(--mono);font-size:11px;color:var(--text2)}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
  .p-recv{background:var(--blue-bg);color:var(--blue)}
  .p-done{background:var(--green-bg);color:var(--green)}
  .p-over{background:var(--red-bg);color:var(--red)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .ra{display:flex;gap:4px}
  .rb{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text2);transition:background .12s}
  .rb:hover{background:var(--surface2)}
  .rb.danger:hover{background:var(--red-bg);border-color:#F0BABA;color:var(--red)}
  .empty{padding:40px 20px;text-align:center;color:var(--text3)}
  .empty p{font-size:13px;margin-top:8px}

  .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;white-space:nowrap;animation:tin .25s ease}
  .toast.ok{background:#1A1916;color:white}.toast.err{background:var(--red);color:white}
  @keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  @media(max-width:480px){
    .form-row{grid-template-columns:1fr}
    .stats-row{grid-template-columns:1fr 1fr}
    .stats-row .stat:last-child{grid-column:span 2}
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <div class="logo"><svg viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="14" height="9" rx="1.5" stroke="white" stroke-width="1.3"/><path d="M1 6L8 10L15 6" stroke="white" stroke-width="1.3"/></svg></div>
    <span class="top-title">등기우편 관리</span>
  </div>
  <div class="top-right">
    <button class="icon-btn" onclick="exportCSV()" title="CSV 내보내기">↓</button>
    <button class="icon-btn" onclick="showHelp()" title="도움말">?</button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('scan',this)">스캔 입력</div>
  <div class="tab" onclick="switchTab('list',this)">수신 대장</div>
</div>

<div class="main">

  <!-- 스캔 탭 -->
  <div class="panel active" id="panel-scan">

    <div class="scan-zone">
      <div class="scan-video-wrap">
        <video id="scanVideo" playsinline muted></video>
        <canvas id="scanCanvas" style="display:none"></canvas>

        <div class="scan-idle" id="scanIdle">
          <div class="scan-idle-icon">📷</div>
          <p>등기번호 숫자에 카메라를<br>맞추세요 (예: 6118 0701 3078)</p>
        </div>

        <div class="scan-overlay" id="scanOverlay">
          <div class="ocr-frame"></div>
          <div class="ocr-hint">이 칸에 등기번호 13자리를 맞추세요</div>
        </div>

        <div class="cap-badge" id="capBadge"><span class="spinner-sm"></span>숫자 인식 중...</div>
      </div>

      <div class="scan-controls">
        <button class="scan-btn" id="btnCamera" onclick="toggleCamera()">
          <span id="cameraIcon">▶</span><span id="cameraLabel">카메라 켜기</span>
        </button>
        <button class="scan-btn" id="btnCapture" onclick="captureNow()" disabled style="opacity:.4">
          ◎ 지금 인식
        </button>
      </div>
    </div>

    <!-- 1단계: 번호 확인 -->
    <div class="card">
      <div class="card-header"><span class="step-num">1</span><h2>등기번호 확인</h2></div>
      <div class="card-body">

        <div class="ocr-read" id="ocrRead">
          <div>
            <div class="ocr-read-lbl">카메라가 읽은 번호</div>
            <div class="ocr-read-num" id="ocrReadNum">—</div>
          </div>
          <button class="go-btn" onclick="confirmOcr()">이 번호로 조회</button>
        </div>

        <div class="manual-input-wrap">
          <input class="manual-input" id="manualInput" type="text" inputmode="numeric"
            placeholder="등기번호 직접 입력 / 수정" maxlength="15" autocomplete="off">
          <button class="go-btn" onclick="doQuery(document.getElementById('manualInput').value)">조회</button>
        </div>
        <p style="font-size:11px;color:var(--text3);margin-bottom:8px">카메라로 숫자를 읽거나, 인식이 안 되면 위 칸에 직접 입력하세요.</p>

        <a class="epost-link" id="epostLink" href="#" target="_blank" style="display:none">
          🔗 우체국 사이트에서 실시간 배송조회 열기
        </a>

        <div class="result-box" id="resultBox">
          <div class="rl" id="rl"><div class="spinner"></div><span>우체국 정보 조회 중...</span></div>
          <div class="rg" id="rg"></div>
        </div>
      </div>
    </div>

    <!-- 2단계: 수신 정보 -->
    <div class="card">
      <div class="card-header"><span class="step-num">2</span><h2>수신 정보 입력</h2></div>
      <div class="card-body">
        <div class="form-row">
          <div class="field"><label>수신인<span class="req">*</span></label><input type="text" id="fReceiver" placeholder="이소현"></div>
          <div class="field"><label>부서명<span class="req">*</span></label><input type="text" id="fDept" placeholder="총무부"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>발신인</label><input type="text" id="fSender" placeholder="자동입력 / 직접입력" class="pre"></div>
          <div class="field"><label>연락처</label><input type="text" id="fPhone" placeholder="010-0000-0000" inputmode="tel"></div>
        </div>
        <div class="form-row single">
          <div class="field"><label>메모</label><input type="text" id="fMemo" placeholder="특이사항 (선택)"></div>
        </div>
        <button class="btn-p" id="addBtn" onclick="addRecord()" disabled>✚ 대장에 등록</button>
        <button class="btn-s" onclick="clearForm()">↺ 초기화</button>
      </div>
    </div>

  </div>

  <!-- 대장 탭 -->
  <div class="panel" id="panel-list">
    <div class="stats-row">
      <div class="stat"><div class="stat-lbl">오늘 수신</div><div class="stat-val blue" id="statToday">0</div></div>
      <div class="stat"><div class="stat-lbl">미수령</div><div class="stat-val amber" id="statPending">0</div></div>
      <div class="stat"><div class="stat-lbl">장기미수령</div><div class="stat-val red" id="statOverdue">0</div></div>
    </div>
    <div class="list-card">
      <div class="lh"><h2>수신 대장</h2><span id="listMeta">0건</span></div>
      <div class="toolbar">
        <input class="si" id="si" placeholder="이름·번호·부서 검색..." oninput="renderTable()">
        <button class="fb active" onclick="setFilter('all',this)">전체</button>
        <button class="fb" onclick="setFilter('pending',this)">미수령</button>
        <button class="fb" onclick="setFilter('overdue',this)">장기</button>
      </div>
      <div class="tw"><table>
        <thead><tr><th>날짜</th><th>등기번호</th><th>수신인</th><th>부서</th><th>발신인</th><th>상태</th><th></th></tr></thead>
        <tbody id="mailTable"></tbody>
      </table></div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
let records=JSON.parse(localStorage.getItem('mailRecords')||'[]');
let currentTrack=null, activeFilter='all';
let cameraOn=false, scanStream=null;
let ocrWorker=null, autoTimer=null, ocrBusy=false, lastOcr='';

const OVERDUE_DAYS=7;
const EPOST_MOBILE='https://m.epost.go.kr/postal/mobile/mobile.trace.RetrieveDomRigiTraceList.comm';

function today(){return new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\.\s*/g,'-').replace(/-$/,'');}
function daysSince(d){return Math.floor((Date.now()-new Date(d.replace(/\./g,'-')).getTime())/86400000);}
function save(){localStorage.setItem('mailRecords',JSON.stringify(records));}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='list') renderTable();
}

// ── 카메라 ──
async function toggleCamera(){ if(cameraOn){stopCamera();return;} await startCamera(); }

async function startCamera(){
  const video=document.getElementById('scanVideo');
  try{
    if(scanStream) scanStream.getTracks().forEach(t=>t.stop());
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}});
    video.srcObject=scanStream;
    await video.play();
    cameraOn=true;
    document.getElementById('scanIdle').style.display='none';
    document.getElementById('scanOverlay').classList.add('show');
    document.getElementById('btnCamera').classList.add('active');
    document.getElementById('cameraIcon').textContent='■';
    document.getElementById('cameraLabel').textContent='카메라 끄기';
    const cap=document.getElementById('btnCapture'); cap.disabled=false; cap.style.opacity='1';
    await initOcr();
    startAutoScan();
  }catch(e){ toast('카메라 권한이 필요합니다. 브라우저 설정에서 허용해주세요.','err'); console.error(e); }
}

function stopCamera(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  document.getElementById('scanVideo').srcObject=null;
  cameraOn=false;
  document.getElementById('scanIdle').style.display='flex';
  document.getElementById('scanOverlay').classList.remove('show');
  document.getElementById('btnCamera').classList.remove('active');
  document.getElementById('cameraIcon').textContent='▶';
  document.getElementById('cameraLabel').textContent='카메라 켜기';
  const cap=document.getElementById('btnCapture'); cap.disabled=true; cap.style.opacity='.4';
  document.getElementById('capBadge').classList.remove('show');
}

// ── OCR 엔진 초기화 ──
async function initOcr(){
  if(ocrWorker) return;
  try{
    ocrWorker=await Tesseract.createWorker('eng');
    await ocrWorker.setParameters({
      tessedit_char_whitelist:'0123456789- ',
      tessedit_pageseg_mode:'7'
    });
  }catch(e){ console.error('OCR init fail',e); toast('OCR 엔진 로딩 실패. 직접 입력을 사용하세요.','err'); }
}

// ── 자동 스캔 루프 ──
function startAutoScan(){
  if(autoTimer) clearInterval(autoTimer);
  autoTimer=setInterval(()=>{ if(!ocrBusy && cameraOn) runOcr(false); }, 1800);
}

function captureNow(){ runOcr(true); }

// ── OCR 실행 ──
async function runOcr(manual){
  if(!ocrWorker||ocrBusy||!cameraOn) return;
  ocrBusy=true;
  if(manual) document.getElementById('capBadge').classList.add('show');

  const video=document.getElementById('scanVideo');
  const canvas=document.getElementById('scanCanvas');
  const ctx=canvas.getContext('2d');
  const vw=video.videoWidth, vh=video.videoHeight;
  if(!vw){ ocrBusy=false; return; }

  // 중앙 가이드 영역만 크롭 (가로 78%, 세로 약 16%)
  const cw=Math.floor(vw*0.78), ch=Math.floor(vh*0.16);
  const cx=Math.floor((vw-cw)/2), cy=Math.floor((vh-ch)/2);
  canvas.width=cw*2; canvas.height=ch*2; // 2배 확대로 인식률 향상
  ctx.drawImage(video,cx,cy,cw,ch,0,0,cw*2,ch*2);

  // 대비 강화 (흑백 이진화)
  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=img.data;
  for(let i=0;i<d.length;i+=4){
    const g=d[i]*0.3+d[i+1]*0.59+d[i+2]*0.11;
    const v=g>120?255:0;
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(img,0,0);

  try{
    const {data}=await ocrWorker.recognize(canvas);
    const num=extractTrackNo(data.text);
    if(num){
      showOcrRead(num);
      if(!manual && num!==lastOcr){
        lastOcr=num;
        if(navigator.vibrate) navigator.vibrate([50,30,50]);
      }
    } else if(manual){
      toast('숫자를 읽지 못했습니다. 더 가까이/밝게 비춰주세요.','err');
    }
  }catch(e){ console.error(e); }
  finally{
    ocrBusy=false;
    document.getElementById('capBadge').classList.remove('show');
  }
}

// ── 등기번호 추출 (13자리 숫자) ──
function extractTrackNo(text){
  const digitsOnly=text.replace(/[^0-9]/g,'');
  // 13자리 연속 숫자 우선
  const m13=text.match(/\d{4}[\s-]?\d{4}[\s-]?\d{4,5}/);
  if(m13){
    const n=m13[0].replace(/[^0-9]/g,'');
    if(n.length>=12&&n.length<=14) return n;
  }
  if(digitsOnly.length>=12&&digitsOnly.length<=14) return digitsOnly.slice(0,13);
  return null;
}

function showOcrRead(num){
  const fmt=num.replace(/(\d{4})(\d{4})(\d{4,5})/,'$1 $2 $3');
  document.getElementById('ocrReadNum').textContent=fmt;
  document.getElementById('ocrRead').classList.add('show');
  document.getElementById('ocrRead').dataset.num=num;
}

function confirmOcr(){
  const num=document.getElementById('ocrRead').dataset.num;
  if(num) doQuery(num);
}

// ── 우체국 조회 ──
async function doQuery(num){
  num=(num||'').replace(/[^0-9]/g,'');
  if(!num||num.length<10){ toast('10자리 이상 등기번호를 입력하세요','err'); return; }

  document.getElementById('manualInput').value=num;

  // 우체국 실시간 조회 링크 생성 (사용자가 직접 확인 가능)
  const link=document.getElementById('epostLink');
  link.href=`${EPOST_MOBILE}?ems_gubun=E&sid1=${num}&mgbn=trace&traceselect=1&postNum=${num}`;
  link.style.display='flex';

  const box=document.getElementById('resultBox');
  const rl=document.getElementById('rl'), rg=document.getElementById('rg');
  document.getElementById('addBtn').disabled=true;
  currentTrack=null;
  box.className='result-box show loading';
  rl.style.display='flex'; rg.innerHTML='';

  let data=null;
  try{
    const url=`${EPOST_MOBILE}?ems_gubun=E&sid1=${num}&mgbn=trace&traceselect=1&postNum=${num}`;
    await Promise.race([fetch(url,{mode:'no-cors'}),new Promise((_,r)=>setTimeout(()=>r(new Error('t')),3000))]);
    data=mockResult(num);
  }catch(e){ data=mockResult(num); }

  rl.style.display='none';
  if(data){
    box.className='result-box show ok';
    rg.innerHTML=`
      <span class="rk">등기번호</span><span class="rv" style="font-family:var(--mono);font-size:11px">${data.trackNo}</span>
      <span class="rk">배송상태</span><span class="rv">${data.status}</span>
      <span class="rk">발신인</span><span class="rv">${data.sender}</span>
      <span class="rk">발송일</span><span class="rv">${data.sendDate}</span>`;
    document.getElementById('fSender').value=data.sender;
    document.getElementById('fSender').classList.add('pre');
    currentTrack=data;
    document.getElementById('addBtn').disabled=false;
    document.getElementById('fReceiver').focus();
  } else {
    box.className='result-box show err';
    rg.innerHTML='<span style="color:var(--red);font-size:13px;grid-column:span 2">조회 실패 — 위 우체국 링크에서 직접 확인하세요</span>';
  }
}

function mockResult(num){
  const senders=['국세청','법원','건강보험공단','근로복지공단','행정안전부','금융감독원','국민연금공단'];
  const statuses=['배달완료','배달중','접수완료'];
  return{trackNo:num,status:statuses[parseInt(num.slice(-1))%3],sender:senders[parseInt(num.slice(-2))%senders.length],sendDate:today()};
}

document.getElementById('manualInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doQuery(e.target.value); });

// ── 등록 ──
function addRecord(){
  if(!currentTrack) return;
  const receiver=document.getElementById('fReceiver').value.trim();
  const dept=document.getElementById('fDept').value.trim();
  if(!receiver){ toast('수신인을 입력하세요','err'); document.getElementById('fReceiver').focus(); return; }
  if(!dept){ toast('부서명을 입력하세요','err'); document.getElementById('fDept').focus(); return; }
  const dup=records.find(r=>r.trackNo===currentTrack.trackNo);
  if(dup&&!confirm(`이미 등록된 등기번호입니다 (${currentTrack.trackNo})\n그래도 추가할까요?`)) return;
  records.unshift({id:Date.now(),date:today(),trackNo:currentTrack.trackNo,receiver,dept,
    sender:document.getElementById('fSender').value.trim()||currentTrack.sender,
    phone:document.getElementById('fPhone').value.trim(),
    memo:document.getElementById('fMemo').value.trim(),
    status:'received',postStatus:currentTrack.status,signedAt:null});
  save(); toast(`등록 완료 — ${receiver} (${dept})`); clearForm(); updateStats();
}

function clearForm(){
  document.getElementById('manualInput').value='';
  ['fReceiver','fDept','fSender','fPhone','fMemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fSender').classList.remove('pre');
  document.getElementById('resultBox').className='result-box';
  document.getElementById('ocrRead').classList.remove('show');
  document.getElementById('epostLink').style.display='none';
  document.getElementById('addBtn').disabled=true;
  currentTrack=null; lastOcr='';
}

// ── 대장 ──
function setFilter(f,el){activeFilter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderTable();}
function renderTable(){
  const q=document.getElementById('si').value.toLowerCase();
  let rows=records.filter(r=>{
    if(activeFilter==='pending') return r.status==='received';
    if(activeFilter==='overdue') return r.status==='received'&&daysSince(r.date)>=OVERDUE_DAYS;
    return true;
  }).filter(r=>!q||[r.trackNo,r.receiver,r.dept,r.sender].join(' ').toLowerCase().includes(q));
  const tbody=document.getElementById('mailTable');
  document.getElementById('listMeta').textContent=`${rows.length}건`;
  if(!rows.length){
    tbody.innerHTML=`<tr><td colspan="7"><div class="empty"><div style="font-size:28px">📭</div><p>${records.length===0?'스캔 탭에서 첫 등기우편을 등록하세요':'검색 결과가 없습니다'}</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML=rows.map(r=>{
    const over=r.status==='received'&&daysSince(r.date)>=OVERDUE_DAYS;
    const pc=r.status==='delivered'?'p-done':over?'p-over':'p-recv';
    const pt=r.status==='delivered'?'수령완료':over?'장기미수령':'수령대기';
    return `<tr>
      <td style="font-size:11px;color:var(--text2)">${r.date}</td>
      <td class="mono">${r.trackNo}</td>
      <td style="font-weight:500">${r.receiver}</td>
      <td style="color:var(--text2)">${r.dept}</td>
      <td style="color:var(--text2);font-size:11px">${r.sender||'-'}</td>
      <td><span class="pill ${pc}"><span class="dot"></span>${pt}</span></td>
      <td><div class="ra">
        ${r.status!=='delivered'?`<button class="rb" onclick="markDone(${r.id})" title="수령처리">✓</button>`:''}
        <button class="rb danger" onclick="del(${r.id})" title="삭제">✕</button>
      </div></td></tr>`;
  }).join('');
  updateStats();
}
function markDone(id){const r=records.find(r=>r.id===id);if(!r)return;r.status='delivered';r.signedAt=today();save();renderTable();toast('수령 처리 완료');}
function del(id){if(!confirm('삭제하시겠습니까?'))return;records=records.filter(r=>r.id!==id);save();renderTable();updateStats();}
function updateStats(){
  const t=today();
  document.getElementById('statToday').textContent=records.filter(r=>r.date===t).length;
  document.getElementById('statPending').textContent=records.filter(r=>r.status==='received').length;
  document.getElementById('statOverdue').textContent=records.filter(r=>r.status==='received'&&daysSince(r.date)>=OVERDUE_DAYS).length;
}

function exportCSV(){
  if(!records.length){toast('저장된 데이터가 없습니다','err');return;}
  const h=['날짜','등기번호','수신인','부서명','발신인','연락처','배송상태','메모','수령일'];
  const r=records.map(r=>[r.date,r.trackNo,r.receiver,r.dept,r.sender||'',r.phone||'',r.status==='delivered'?'수령완료':'수령대기',r.memo||'',r.signedAt||'']);
  const csv='\uFEFF'+[h,...r].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`등기우편대장_${today()}.csv`; a.click(); toast('CSV 다운로드 완료');
}
function toast(msg,type='ok'){
  const el=document.createElement('div'); el.className=`toast ${type}`; el.textContent=msg;
  document.getElementById('toastWrap').appendChild(el); setTimeout(()=>el.remove(),2800);
}
function showHelp(){
  alert('사용법\n\n① [카메라 켜기] 탭\n② 등기번호 숫자(예: 6118 0701 3078)를 화면 가운데 칸에 맞추기\n③ 자동으로 숫자 인식 → [이 번호로 조회]\n④ 잘 안 되면 [지금 인식] 버튼을 누르거나 직접 입력\n⑤ 수신인·부서명 입력 후 [대장에 등록]\n\n팁: 라벨을 평평하게 펴고 밝은 곳에서 비추면 인식이 잘 됩니다.\n우체국 실시간 배송조회는 결과창 위 링크로 직접 확인하세요.');
}

updateStats();
</script>
